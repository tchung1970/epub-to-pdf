# Drop this inside an existing `server { ... }` block (e.g. the HTTPS
# server in /etc/nginx/sites-enabled/default). It exposes the app at
# https://<host>/epub-to-pdf/.
#
# To serve at the apex instead, change the location to `/` and drop
# the trailing slash on proxy_pass.

location /epub-to-pdf/ {
    proxy_pass http://127.0.0.1:5001/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Conversion of large books can take a while.
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # Match the Flask MAX_CONTENT_LENGTH in web.py.
    client_max_body_size 25M;
}
